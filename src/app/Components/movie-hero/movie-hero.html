<section class="position-relative text-white overflow-hidden" style="height: 75vh;">
      <img [src]="movie.backdropUrl" class="position-absolute w-100 h-100 object-fit-cover top-0 start-0" alt="Backdrop">
      <div class="position-absolute w-100 h-100 hero-overlay"></div>
      
      <div class="container-fluid px-md-5 position-relative h-100 d-flex flex-column justify-content-end pb-5">
        <div class="d-flex align-items-center gap-2 mb-2">
          <span class="badge border border-primary text-primary px-3">ULTRA HD 4K</span>
          <span class="text-warning fw-bold"><i class="bi bi-star-fill"></i> {{movie.rating}}</span>
        </div>
        <h1 class="display-2 fw-bold mb-3">{{movie.title}}</h1>
       <div class="movie-metadata">
            <!-- Use a flex container with a gap for clean spacing -->
            <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                
                <!-- Year and Duration: Use subtle text or different badge styles for hierarchy -->
                <span class="fw-bold text-dark">{{ movie.year }}</span>
                <span class="text-muted">&bull;</span> <!-- The dot separator you requested -->
                <span class="text-muted">{{ movie.duration }}</span>

                <!-- Genres: Standardized badges -->
                @for (genre of movie.genres; track genre) {
                <span class="badge rounded-pill bg-light text-primary border border-primary-subtle px-3">
                    {{ genre }}
                </span>
                }
            </div>

            <!-- Description: Improved line height and text color for readability -->
            <p class="text-white lh-base mb-4">
                {{ movie.description }}
            </p>
        </div>
    
        <div class="d-flex gap-3 mb-4">
          <button class="btn btn-primary btn-lg px-5 fw-bold shadow" (click)="onWatchClick()">WATCH NOW</button>
          <button class="btn btn-outline-light btn-lg px-5 fw-bold">MY LIST</button>
        </div>
      </div>
</section>
