<section class="position-relative text-white overflow-hidden" style="height: 75vh">
  <img
    [src]="movie.backdropUrl"
    class="position-absolute w-100 h-100 object-fit-cover top-0 start-0"
    alt="Backdrop"
  />
  <div class="position-absolute w-100 h-100 hero-overlay"></div>

  <div
    class="container-fluid px-md-5 position-relative h-100 d-flex flex-column justify-content-end pb-5"
  >
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="badge border px-3" style="background-color: #9acbff">ULTRA HD 4K</span>
      <span class="text-warning fw-bold"><i class="bi bi-star-fill"></i> {{ movie.rating }}</span>
    </div>
    <h1 class="display-2 fw-bold mb-3">{{ movie.title }}</h1>
    <div class="movie-metadata">
      <!-- Use a flex container with a gap for clean spacing -->
      <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
        <!-- Year and Duration: Use subtle text or different badge styles for hierarchy -->
        <span class="fw-bold" style="color: #9acbff">{{ movie.year }}</span>
        <span class="text-muted">&bull;</span>
        <!-- The dot separator you requested -->
        <span class="text-muted" style="color: #9acbff !important">{{ movie.duration }}</span>

        <!-- Genres: Standardized badges -->
        @for (genre of movie.genres; track genre) {
          <span
            class="badge rounded-pill bg-light border border-primary-subtle px-3"
            style="color: #9acbff"
          >
            {{ genre }}
          </span>
        }
      </div>

      <!-- Description: Improved line height and text color for readability -->
      <p class="text-white lh-base mb-4">
        {{ movie.description }}
      </p>
    </div>

    <div class="d-flex gap-3 mb-4">
      <button
        class="btn btn-lg px-5 fw-bold shadow"
        style="background-color: #9acbff"
        (click)="onWatchClick()"
      >
        WATCH NOW
      </button>
      <button class="btn btn-outline-light btn-lg px-5 fw-bold" (click)="onAddToWatchLater()">
        MY LIST
      </button>
    </div>
  </div>
</section>
