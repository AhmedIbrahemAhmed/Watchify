<div class="container-fluid px-md-5 mt-5 pb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-white">User Reviews</h3>
    <button class="btn btn-sm" style="background-color: #9acbff">Write a Review</button>
  </div>

  <div class="row g-4">
    @for (review of reviews; track review) {
      <div class="col-md-6">
        <div class="card bg-dark text-white border-secondary p-4 h-100 rounded-4 backdrop-blur">
          <div class="d-flex justify-content-between mb-3">
            <div class="d-flex align-items-center gap-3">
              <img
                [src]="review.avatar"
                class="rounded-circle border border-secondary"
                width="48"
                height="48"
              />
              <div>
                <h6 class="mb-0">{{ review.user }}</h6>
                <small class="text-secondary">{{ review.date }}</small>
              </div>
            </div>
            <div class="text-warning"><i class="bi bi-star-fill"></i> {{ review.rating }}</div>
          </div>
          <p class="text-secondary mb-0 fst-italic">"{{ review.comment }}"</p>
        </div>
      </div>
    }
  </div>
</div>
