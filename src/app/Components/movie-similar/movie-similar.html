<div class="container-fluid px-md-5 mt-5">
  <h3 class="text-white mb-4">Similar to this</h3>
  
  <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4 flex-nowrap overflow-x-auto pb-4 custom-slider">
    
    @for (item of movies; track item.id) {
      <div class="col flex-shrink-0">
        <div class="card bg-dark border-0 rounded-4 overflow-hidden h-100 movie-card shadow-lg" 
             [routerLink]="['/watchify/movies', item.id]">
          
          <div class="position-relative aspect-poster">
            <img [src]="item.posterUrl" class="w-100 h-100 object-fit-cover" [alt]="item.title">
            
            <div class="card-img-overlay d-flex flex-column justify-content-end p-3 hover-reveal">
              <div class="d-flex align-items-center gap-2 mb-1">
                <span class="text-warning small"><i class="bi bi-star-fill"></i> {{item.rating}}</span>
                <span class="text-secondary small">• {{item.year}}</span>
              </div>
              <h6 class="card-title text-white mb-1 text-truncate">{{item.title}}</h6>
              <div class="d-flex flex-wrap gap-1">
                @for (g of item.genres; track g) {
                  <span class="badge bg-secondary-subtle text-white extra-small">{{g}}</span>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    }
    
  </div>
</div>
